services:
  postgres:
    image: postgres:16-alpine
    container_name: cresdynamics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cres
      POSTGRES_PASSWORD: cres
      POSTGRES_DB: cresdynamics
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      # Avoid clashes with local Postgres on 5432/5433 — pick a free host port if this fails
      - '15432:5432'
    volumes:
      - cresdynamics_pgdata:/var/lib/postgresql/data

volumes:
  cresdynamics_pgdata:
